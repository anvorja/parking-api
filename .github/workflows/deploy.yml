name: Build and Deploy

on:
  push:
    branches:
      - develop_1c

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout del código
      # ─────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Configurar JDK 17 (para compilar el proyecto Spring Boot)
      # ─────────────────────────────────────────────
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────────
      # 3. Cache de dependencias Maven
      # ─────────────────────────────────────────────
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ─────────────────────────────────────────────
      # 4. Build del proyecto (sin tests para agilizar CI)
      # ─────────────────────────────────────────────
      - name: Build con Maven
        run: ./mvnw clean package -DskipTests

      # ─────────────────────────────────────────────
      # 5. Login en DockerHub
      #    Secrets requeridos:
      #      - DOCKER_USERNAME  → tu usuario de DockerHub
      #      - DOCKER_TOKEN     → Access Token de DockerHub
      # ─────────────────────────────────────────────
      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ─────────────────────────────────────────────
      # 6. Extraer short SHA del commit (7 caracteres)
      # ─────────────────────────────────────────────
      - name: Obtener short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────
      # 7. Build de la imagen Docker con dos tags:
      #      - latest
      #      - <commit-sha>
      # ─────────────────────────────────────────────
      - name: Build imagen Docker
        run: |
          docker build \
            -t anborja/parking-api:latest \
            -t anborja/parking-api:${{ steps.vars.outputs.SHORT_SHA }} \
            .

      # ─────────────────────────────────────────────
      # 8. Push de ambos tags a DockerHub
      # ─────────────────────────────────────────────
      - name: Push imagen a DockerHub
        run: |
          docker push anborja/parking-api:latest
          docker push anborja/parking-api:${{ steps.vars.outputs.SHORT_SHA }}

      # ─────────────────────────────────────────────
      # 9a. Trigger redeploy en RENDER (opcional)
      #     Secrets requeridos:
      #       - RENDER_API_KEY    → API Key de Render
      #       - RENDER_SERVICE_ID → ID del servicio en Render
      #
      #     Eliminar este step si usas Railway.
      # ─────────────────────────────────────────────
      - name: Trigger redeploy en Render
        run: |
          curl -X POST \
            "https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"

      # ─────────────────────────────────────────────
      # 9b. Trigger redeploy en RAILWAY (opcional)
      #     Secrets requeridos:
      #       - RAILWAY_TOKEN → Token de Railway
      #
      #     Descomentar este bloque si usas Railway
      #     y eliminar el step de Render.
      # ─────────────────────────────────────────────
      # - name: Deploy en Railway
      #   run: |
      #     npm i -g @railway/cli
      #     railway up --service parking-api
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # ─────────────────────────────────────────────
      # 10. Resumen del deploy
      # ─────────────────────────────────────────────
      - name: Resumen del deploy
        run: |
          echo "Deploy completado"
          echo "Imagen: anborja/parking-api:latest"
          echo "Tag commit: anborja/parking-api:${{ steps.vars.outputs.SHORT_SHA }}"
